name: Build Geode mod

on:
  workflow_dispatch:
  push:
    branches:
      - "main"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest
          
        - name: macOS
          os: macos-latest

        - name: Android32
          os: ubuntu-latest
          target: Android32

        - name: Android64
          os: ubuntu-latest
          target: Android64

        - name: iOS
          os: macos-latest
          target: iOS

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          export-pdb: true
          bundle-pdb: true
          export-symbols: true
          target: ${{ matrix.config.target }}
      
  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: ['build']

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.build.outputs.build-output }}

      - name: "Development Release"
        uses: ncipollo/release-action@v1
        with:
          name: "Development Release"
          body: |
           Release of success build for latest commit on `${{ github.head_ref || github.ref_name }}`.
           The build workflow run for this release goes in [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          tag: "nightly"
          prerelease: true
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: "${{steps.build.outputs.build-output}}/*"

      - name: "Get mod properties"
        id: json_properties
        uses: ActionsTools/read-json-action@main
        with:
          file_path: "mod.json"

      - name: "Try Release Version"
        uses: ncipollo/release-action@v1
        with:
          generateReleaseNotes: true
          tag: "${{steps.json_properties.outputs.version}}"
          artifacts: "${{steps.build.outputs.build-output}}/*"
          artifactErrorsFailBuild: true
          allowUpdates: false
